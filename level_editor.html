<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Buff Noah's Quest — Level Editor</title>
<style>
  :root{--bg:#16121f;--pan:#241a33;--ink:#e8e0f0;--acc:#4878e8;--gold:#f8d048;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:13px system-ui,Arial,sans-serif;overflow:hidden}
  #top{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:6px 10px;background:var(--pan);border-bottom:1px solid #382850}
  #top b{color:var(--gold);margin-right:6px}
  input,select{background:#0e0a16;color:var(--ink);border:1px solid #382850;border-radius:4px;padding:3px 5px;font:12px system-ui}
  input.s{width:46px}input.n{width:120px}
  button{background:var(--acc);color:#fff;border:0;padding:5px 9px;border-radius:5px;cursor:pointer;font-weight:bold;font-size:12px}
  button:hover{filter:brightness(1.12)}button.alt{background:#3a3050}button.on{background:var(--gold);color:#241a33}
  label{display:inline-flex;gap:3px;align-items:center}
  #main{display:flex;height:calc(100vh - 92px)}
  #left{width:210px;background:#1c1628;border-right:1px solid #382850;overflow-y:auto;padding:6px}
  #right{width:240px;background:#1c1628;border-left:1px solid #382850;overflow-y:auto;padding:8px}
  #cwrap{flex:1;position:relative;overflow:hidden;background:#0a0712}
  canvas{position:absolute;top:0;left:0;cursor:crosshair;image-rendering:pixelated}
  h4{margin:8px 2px 4px;color:var(--gold);font-size:11px;letter-spacing:.5px;text-transform:uppercase}
  .pal{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}
  .pal .t{position:relative;aspect-ratio:1;border:2px solid #2a2238;border-radius:4px;cursor:pointer;overflow:hidden}
  .pal .t.sel{border-color:var(--gold)}
  .pal .t canvas{position:static;width:100%;height:100%}
  .pal .t span{position:absolute;left:1px;bottom:0;font-size:7px;color:#fff;text-shadow:0 0 2px #000;pointer-events:none}
  .objpal{display:grid;grid-template-columns:repeat(2,1fr);gap:3px}
  .objpal button{background:#2a2238;text-align:left;padding:4px 6px;font-size:11px}
  .objpal button.sel{background:var(--gold);color:#241a33}
  .tools{display:flex;gap:3px;flex-wrap:wrap}
  textarea{width:100%;height:150px;background:#0e0a16;color:#9adcf8;border:1px solid #382850;border-radius:5px;font:11px ui-monospace,monospace;padding:6px}
  #status{font-size:11px;color:#b0a0c8;padding:3px 10px;background:var(--pan);border-top:1px solid #382850;height:24px;line-height:18px;white-space:nowrap;overflow:hidden}
  #out{position:fixed;inset:auto 0 0 0;height:34vh;background:#0b0712;border-top:2px solid var(--gold);padding:6px 10px;display:none;z-index:5}
  #out textarea{height:calc(34vh - 40px)}
  .row{display:flex;gap:5px;align-items:center;margin:3px 0}
  small{color:#8a7aa8}
</style></head>
<body>
<div id="top">
  <b>LEVEL EDITOR</b>
  <label>id <input id="mid" class="s" style="width:90px" value="mymap"></label>
  <label>fn <input id="mfn" class="n" value="buildMyMap"></label>
  <label>name <input id="mname" class="n" value="My Map"></label>
  <label>W <input id="mw" class="s" type="number" value="40"></label>
  <label>H <input id="mh" class="s" type="number" value="28"></label>
  <button class="alt" id="resize">Resize</button>
  <label>base
    <select id="mbase"></select></label>
  <label>zone <select id="mzone"><option>burrow</option><option>vale</option><option>coast</option><option>wastes</option><option>canyon</option><option>sky</option></select></label>
  <label>song <select id="msong"></select></label>
  <label>cliff <select id="mcliff"><option>dirt</option><option>stone</option><option>void</option><option>sea</option><option>snow</option><option>canyon</option></select></label>
  <label><input type="checkbox" id="mdark">dark</label>
  <label><input type="checkbox" id="mnofly">noFly</label>
  <label><input type="checkbox" id="mdungeon">dungeon</label>
  <span style="flex:1"></span>
  <button id="exportc">Export code</button>
  <button class="alt" id="exportj">Save .json</button>
  <button class="alt" id="importj">Load .json</button>
  <label>level <select id="mlevel" style="width:130px"></select></label>
  <button class="alt" id="loadlevel">Open level</button>
  <button id="exporte">Save level edit</button>
  <input type="file" id="file" accept=".json" style="display:none">
</div>
<div id="main">
  <div id="left">
    <h4>Tools</h4>
    <div class="tools" id="tools"></div>
    <label style="margin-top:6px"><input type="checkbox" id="grid" checked> grid</label>
    <h4>Tiles</h4>
    <div class="pal" id="tilepal"></div>
    <h4>Elevation</h4>
    <div class="tools" id="elevpal"></div>
    <label style="margin-top:4px"><input type="checkbox" id="showelev" checked> show height</label>
    <h4>Objects</h4>
    <div class="objpal" id="objpal"></div>
  </div>
  <div id="cwrap"><canvas id="cv"></canvas></div>
  <div id="right">
    <h4>Inspector</h4>
    <div id="insp"><small>Select an object (with the Select tool) to edit its properties, or pick an Object below and click the map to place it.</small></div>
  </div>
</div>
<div id="status">ready</div>
<div id="out">
  <div class="row"><b id="outtitle" style="color:#f8d048">Export</b><span style="flex:1"></span>
    <button id="copyout">Copy</button><button id="dlout" class="alt">Download</button><button id="closeout" class="alt">Close</button></div>
  <textarea id="outtext" spellcheck="false"></textarea>
</div>
<script>window.NQ_EDITOR = true;   // tell game.js: give us data + art, do NOT boot the game</script>
<script src="game.js"></script>
<script>
(function(){   // IIFE: keep editor names (TILEDEFS alias, render, ...) out of game.js's scope
/* ===== the GAME is the single source of truth: game.js (loaded above) provides
   every tile id, the real tile art (incl. imported HD tiles), and EVERY level. ===== */
const NQ = window.NQ;
NQ.buildAll();                                    // sprites + tile art + all maps (no game boot)
const TILEDEFS = NQ.TILEDEFS, GAME_MAPS = NQ.MAPS, CREATURES = NQ.CREATURES;
function mkc(w,h){const c=document.createElement('canvas');c.width=w;c.height=h;return c;}
const TILE_IDS = Object.keys(TILEDEFS);
function art(id){ const v = NQ.TileArt && NQ.TileArt.variants && NQ.TileArt.variants[id]; return (v && v[0]) || null; }
setTimeout(()=>{ buildPalette(); render(); }, 700);   // imported HD tile art decodes async — refresh once

/* ===== editor state ===== */
const SONGS=['dungeon','vale','coast','wastes','canyon','boss','deep','title','road','storm'];
const SPECIES=Object.keys(CREATURES);   // every catchable species, always current
function blank(w,h,base){const t=[],el=[];for(let j=0;j<h;j++){t.push(new Array(w).fill(base));el.push(new Array(w).fill(0));}
  return {id:'mymap',fn:'buildMyMap',name:'My Map',w,h,base,zone:'burrow',song:'dungeon',cliff:'dirt',dark:false,noFly:false,dungeon:false,tiles:t,elev:el,objects:[],start:{x:3,y:Math.floor(h/2)}};}
let map=blank(40,28,'soil');
let zoom=22,camX=0,camY=0,tool='pencil',curTile='rootwall',curObj='chest',sel=null,showGrid=true;
let mode='tile',curElev=1,showElev=true;   // mode: 'tile' paints tiles, 'elev' paints elevation
let drag=null; const undoStack=[];
function snapshot(){undoStack.push(JSON.stringify({tiles:map.tiles,elev:map.elev,objects:map.objects,start:map.start})); if(undoStack.length>60)undoStack.shift();}
function undo(){const s=undoStack.pop(); if(!s)return; const d=JSON.parse(s); map.tiles=d.tiles; if(d.elev)map.elev=d.elev; map.objects=d.objects; map.start=d.start; sel=null; inspector(); render();}

const OBJDEF={
  chest:()=>({type:'chest',loot:{coins:10}}), sign:()=>({type:'sign',text:'A sign.'}),
  npc:()=>({type:'npc',who:'granny',name:'Friend'}), boss:()=>({type:'boss',boss:'mottle'}),
  portal:()=>({type:'portal',to:'vale',tx:4,ty:20,req:''}), door:()=>({type:'door',kind:'flag',req:'myflag',msg:'A gate.'}),
  spawn:()=>({type:'spawn',species:'sheep',sw:6,sh:4,n:3}), link:()=>({type:'link',to:'vale',tx:4,ty:20,req:'',msg:''}),
  post:()=>({type:'post'}), lever:()=>({type:'lever',flag:'myflag',msg:'Click!'}), block:()=>({type:'block',id:'blk1'}),
  ramhole:()=>({type:'ramhole',flag:'gate1',compOnly:true,msg:'RAMSI shrinks through and flips the latch!'}),
  boneswitch:()=>({type:'boneswitch',flag:'gate1',compOnly:true,msg:'CLACK!'}),
  bouncepad:()=>({type:'bouncepad',to:[0,0],msg:'BOING!'}), glidevent:()=>({type:'glidevent',to:[0,0],msg:'Glide across!'}),
  pillowkin:()=>({type:'pillowkin',kin:1,caged:true,warden:'mottle',name:'KIN',color:'#d8b48a',gives:['ramGlow','ramShrink'],freed:'Freed!'}),
  ramswitch:()=>({type:'ramswitch',flag:'sky_gate',msg:'RAMSI butts the switch!'}), warp:()=>({type:'warp',tx:0,ty:0}),
  prop:()=>({type:'prop',sprite:'beacon'}),
};
const OBJC={chest:'#f8d048',sign:'#ffffff',npc:'#40ff60',boss:'#ff2020',portal:'#b070ff',door:'#f8b800',spawn:'#80d0ff',link:'#a0f0a0',post:'#30e0ff',lever:'#ffe040',block:'#ff9020',ramhole:'#b0b0b0',boneswitch:'#e8b048',bouncepad:'#ff90c0',glidevent:'#90e0ff',pillowkin:'#ff70c0',ramswitch:'#9adcf8',warp:'#80f0ff',prop:'#c0a0e0'};
const OBJL={chest:'C',sign:'S',npc:'N',boss:'B',portal:'P',door:'D',spawn:'~',link:'L',post:'I',lever:'/',block:'#',ramhole:'o',boneswitch:'.',bouncepad:'^',glidevent:'=',pillowkin:'K',ramswitch:'*',warp:'@',prop:'x'};

/* ===== DOM setup ===== */
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),wrap=document.getElementById('cwrap');
const $=id=>document.getElementById(id);
function fillSel(el,arr,val){el.innerHTML='';for(const a of arr){const o=document.createElement('option');o.value=o.textContent=a;el.appendChild(o);}el.value=val;}
fillSel($('mbase'),TILE_IDS,map.base); fillSel($('msong'),SONGS,map.song);
function syncProps(){map.id=$('mid').value;map.fn=$('mfn').value;map.name=$('mname').value;map.base=$('mbase').value;map.zone=$('mzone').value;map.song=$('msong').value;map.cliff=$('mcliff').value;map.dark=$('mdark').checked;map.noFly=$('mnofly').checked;map.dungeon=$('mdungeon').checked;}
['mid','mfn','mname','mbase','mzone','msong','mcliff','mdark','mnofly','mdungeon'].forEach(id=>$(id).addEventListener('change',syncProps));
function loadProps(){$('mid').value=map.id;$('mfn').value=map.fn;$('mname').value=map.name;$('mw').value=map.w;$('mh').value=map.h;$('mbase').value=map.base;$('mzone').value=map.zone;$('msong').value=map.song;$('mcliff').value=map.cliff;$('mdark').checked=map.dark;$('mnofly').checked=map.noFly;$('mdungeon').checked=map.dungeon;}

// tools
const TOOLS=[['pencil','Paint'],['rect','Rect'],['fill','Fill'],['erase','Erase'],['object','Object'],['select','Select'],['start','Start']];
const toolbox=$('tools'); TOOLS.forEach(([t,lbl])=>{const b=document.createElement('button');b.textContent=lbl;b.className=t===tool?'on':'';b.onclick=()=>{tool=t;[...toolbox.children].forEach((c,i)=>c.className=TOOLS[i][0]===tool?'on':'');setStatus();};toolbox.appendChild(b);});

// tile palette — every TILEDEFS id, drawn with the game's real tile art
const tp=$('tilepal');
function buildPalette(){tp.innerHTML='';TILE_IDS.forEach(id=>{const d=document.createElement('div');d.className='t'+(id===curTile&&mode==='tile'?' sel':'');d.title=id;
  const c=mkc(16,16);const a=art(id);if(a)c.getContext('2d').drawImage(a,0,0);else{const x=c.getContext('2d');x.fillStyle='#f0f';x.fillRect(0,0,16,16);}d.appendChild(c);
  const s=document.createElement('span');s.textContent=id;d.appendChild(s);
  d.onclick=()=>{mode='tile';curTile=id;tool=(tool==='object'||tool==='select'||tool==='start')?'pencil':tool;[...tp.children].forEach(x=>x.classList.toggle('sel',x.title===id));elevSel();[...toolbox.children].forEach((c,i)=>c.className=TOOLS[i][0]===tool?'on':'');setStatus();};
  tp.appendChild(d);});}
buildPalette();

// elevation palette — paint HEIGHT (0-4) with the same tools; tiles keep their look
const ep=$('elevpal');
for(let e=0;e<=4;e++){const b=document.createElement('button');b.textContent='E'+e;b.title='paint elevation '+e;
  b.onclick=()=>{mode='elev';curElev=e;tool=(tool==='object'||tool==='select'||tool==='start')?'pencil':tool;elevSel();[...tp.children].forEach(x=>x.classList.remove('sel'));[...toolbox.children].forEach((c,i)=>c.className=TOOLS[i][0]===tool?'on':'');setStatus();};
  ep.appendChild(b);}
function elevSel(){[...ep.children].forEach((b,i)=>b.className=(mode==='elev'&&i===curElev)?'on':'alt');}
elevSel();
$('showelev').onchange=e=>{showElev=e.target.checked;render();};

// level selector — every map in the game, ready to open
const ml=$('mlevel');{const o0=document.createElement('option');o0.value='';o0.textContent='(new blank map)';ml.appendChild(o0);
  Object.keys(GAME_MAPS).sort().forEach(id=>{const o=document.createElement('option');o.value=id;o.textContent=id+'  ('+(GAME_MAPS[id].name||'')+')';ml.appendChild(o);});}
$('loadlevel').onclick=()=>{const id=ml.value;if(!id){map=blank(40,28,'soil');undoStack.length=0;sel=null;loadProps();fitView();inspector();render();setStatus();return;}loadGameMap(id);};
function deep(o){return JSON.parse(JSON.stringify(o));}
function mostCommonTile(g){const n={};for(const row of g.tiles)for(const t of row)n[t]=(n[t]||0)+1;return Object.keys(n).sort((a,b)=>n[b]-n[a])[0]||'grass';}
function loadGameMap(id){const g=GAME_MAPS[id];if(!g)return;
  const objs=deep(g.objects||[]);
  for(const L of (g.links||[]))objs.push({type:'link',x:L.x,y:L.y,to:L.to,tx:L.tx,ty:L.ty,req:L.req||'',msg:L.msg||''});
  for(const k of Object.keys(g.doors||{})){const dp=k.split(',');const d=g.doors[k];objs.push({type:'door',x:+dp[0],y:+dp[1],kind:d.kind,req:d.req||'',msg:d.msg||''});}
  for(const sp of (g.spawns||[]))objs.push({type:'spawn',x:sp.x,y:sp.y,species:sp.species,sw:sp.w,sh:sp.h,n:sp.n});
  map={id:g.id,fn:'edit_'+g.id,name:g.name||g.id,w:g.w,h:g.h,base:mostCommonTile(g),zone:g.zone||'vale',song:g.song||'vale',cliff:g.cliff||'dirt',dark:!!g.dark,noFly:!!g.noFly,dungeon:!!g.dungeon,
    tiles:deep(g.tiles),elev:deep(g.elev||[]),objects:objs,start:deep(g.start||{x:2,y:2}),gameMap:true};
  while(map.elev.length<map.h)map.elev.push(new Array(map.w).fill(0));
  undoStack.length=0;sel=null;loadProps();fitView();inspector();render();
  $('status').textContent='Opened "'+id+'" — repaint tiles + height, then click "Save level edit". Objects shown for reference (moving them does NOT export).';}

// object palette
const op=$('objpal'); Object.keys(OBJDEF).forEach(t=>{const b=document.createElement('button');b.textContent=t;b.style.borderLeft='4px solid '+OBJC[t];
  b.onclick=()=>{curObj=t;tool='object';[...op.children].forEach(x=>x.classList.toggle('sel',x.textContent===t));[...toolbox.children].forEach((c,i)=>c.className=TOOLS[i][0]===tool?'on':'');setStatus();};
  op.appendChild(b);});

/* ===== rendering ===== */
function resizeCanvas(){cv.width=wrap.clientWidth;cv.height=wrap.clientHeight;render();}
window.addEventListener('resize',resizeCanvas);
function render(){
  ctx.fillStyle='#0a0712';ctx.fillRect(0,0,cv.width,cv.height);ctx.imageSmoothingEnabled=false;
  const z=zoom;
  const x0=Math.max(0,Math.floor(camX/z)),x1=Math.min(map.w-1,Math.floor((camX+cv.width)/z));
  const y0=Math.max(0,Math.floor(camY/z)),y1=Math.min(map.h-1,Math.floor((camY+cv.height)/z));
  for(let j=y0;j<=y1;j++)for(let i=x0;i<=x1;i++){const t=map.tiles[j][i],a=art(t),sx=i*z-camX,sy=j*z-camY;
    if(a)ctx.drawImage(a,sx,sy,z,z);else{ctx.fillStyle='#f0f';ctx.fillRect(sx,sy,z,z);}}
  // elevation overlay: brighter = higher, dark rims where the ground drops, numbers in elev mode
  if(showElev&&map.elev)for(let j=y0;j<=y1;j++)for(let i=x0;i<=x1;i++){const e=(map.elev[j]||[])[i]||0,sx=i*z-camX,sy=j*z-camY;
    if(e>0){ctx.fillStyle='rgba(255,255,255,'+(0.055*e).toFixed(3)+')';ctx.fillRect(sx,sy,z,z);}
    const eS=j+1<map.h?(((map.elev[j+1]||[])[i])||0):e,eE=i+1<map.w?(((map.elev[j]||[])[i+1])||0):e;
    if(e>eS){ctx.fillStyle='rgba(10,6,20,.55)';ctx.fillRect(sx,sy+z-2,z,2);}
    if(e>eE){ctx.fillStyle='rgba(10,6,20,.45)';ctx.fillRect(sx+z-2,sy,2,z);}
    if(mode==='elev'&&z>=14&&e>0){ctx.fillStyle='rgba(255,255,255,.8)';ctx.font='bold '+Math.round(z*0.34)+'px monospace';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText(e,sx+2,sy+1);}}
  if(showGrid&&z>=10){ctx.strokeStyle='rgba(255,255,255,.07)';ctx.lineWidth=1;ctx.beginPath();
    for(let i=x0;i<=x1+1;i++){const sx=i*z-camX;ctx.moveTo(sx,0);ctx.lineTo(sx,cv.height);}
    for(let j=y0;j<=y1+1;j++){const sy=j*z-camY;ctx.moveTo(0,sy);ctx.lineTo(cv.width,sy);}ctx.stroke();}
  // border of the map
  ctx.strokeStyle='#5a4a78';ctx.lineWidth=2;ctx.strokeRect(-camX,-camY,map.w*z,map.h*z);
  // objects
  for(const o of map.objects)drawObj(o,o===sel);
  drawStart();
  // rect preview
  if(drag&&drag.tool==='rect'){const a=drag,b=drag.cur;const rx=Math.min(a.x,b.x),ry=Math.min(a.y,b.y),rw=Math.abs(a.x-b.x)+1,rh=Math.abs(a.y-b.y)+1;
    ctx.fillStyle='rgba(248,208,72,.25)';ctx.fillRect(rx*z-camX,ry*z-camY,rw*z,rh*z);ctx.strokeStyle='#f8d048';ctx.strokeRect(rx*z-camX,ry*z-camY,rw*z,rh*z);}
}
function drawObj(o,seld){const z=zoom,cx=o.x*z-camX+z/2,cy=o.y*z-camY+z/2,r=Math.max(5,z*0.42);
  // to-target line for bounce/glide
  if((o.type==='bouncepad'||o.type==='glidevent')&&o.to){const tx=o.to[0]*z-camX+z/2,ty=o.to[1]*z-camY+z/2;
    ctx.strokeStyle=OBJC[o.type];ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(tx,ty);ctx.stroke();ctx.setLineDash([]);
    ctx.strokeStyle=OBJC[o.type];ctx.strokeRect(o.to[0]*z-camX+2,o.to[1]*z-camY+2,z-4,z-4);}
  if(o.type==='spawn'){const w=(o.sw||1)*z,h=(o.sh||1)*z;ctx.strokeStyle=OBJC.spawn;ctx.setLineDash([3,3]);ctx.strokeRect(o.x*z-camX,o.y*z-camY,w,h);ctx.setLineDash([]);}
  ctx.fillStyle='rgba(10,7,18,.6)';ctx.beginPath();ctx.arc(cx,cy,r+1.5,0,7);ctx.fill();
  ctx.fillStyle=OBJC[o.type]||'#fff';ctx.beginPath();ctx.arc(cx,cy,r,0,7);ctx.fill();
  ctx.fillStyle='#241a33';ctx.font='bold '+Math.round(r*1.3)+'px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(OBJL[o.type]||'?',cx,cy+1);
  if(seld){ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,r+3,0,7);ctx.stroke();}
  const lbl=o.boss||o.who||o.species||o.to||o.name||'';
  if(z>=16&&lbl){ctx.fillStyle='#fff';ctx.font='9px system-ui';ctx.textBaseline='top';ctx.fillText((''+lbl).slice(0,10),cx,cy+r+1);}
}
function drawStart(){const z=zoom,sx=map.start.x*z-camX,sy=map.start.y*z-camY;ctx.strokeStyle='#58f078';ctx.lineWidth=2;ctx.strokeRect(sx+1,sy+1,z-2,z-2);
  ctx.fillStyle='#58f078';ctx.font='bold '+Math.max(8,z*0.5)+'px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('S',sx+z/2,sy+z/2);}

/* ===== input ===== */
function tileAtEvent(e){const r=cv.getBoundingClientRect();const px=(e.clientX-r.left),py=(e.clientY-r.top);
  return {x:Math.floor((px+camX)/zoom),y:Math.floor((py+camY)/zoom),px,py};}
function inBounds(x,y){return x>=0&&y>=0&&x<map.w&&y<map.h;}
function setTile(x,y,t){if(!inBounds(x,y))return;
  if(mode==='elev'){if(map.elev[y][x]!==(t==='__erase'?0:curElev))map.elev[y][x]=(t==='__erase'?0:curElev);return;}
  if(t==='__erase')t=map.base;
  if(map.tiles[y][x]!==t)map.tiles[y][x]=t;}
function objAt(x,y){for(let i=map.objects.length-1;i>=0;i--){const o=map.objects[i];if(o.x===x&&o.y===y)return o;}return null;}

cv.addEventListener('mousedown',e=>{
  if(e.button===1||e.button===2||(e.button===0&&e.altKey)){drag={pan:true,sx:e.clientX,sy:e.clientY,cx:camX,cy:camY};e.preventDefault();return;}
  const {x,y}=tileAtEvent(e);if(!inBounds(x,y)&&tool!=='select')return;
  if(tool==='pencil'){snapshot();setTile(x,y,curTile);drag={tool:'paint'};render();}
  else if(tool==='erase'){snapshot();setTile(x,y,'__erase');drag={tool:'erase'};render();}
  else if(tool==='fill'){snapshot();floodFill(x,y,curTile);render();}
  else if(tool==='rect'){drag={tool:'rect',x,y,cur:{x,y}};}
  else if(tool==='start'){snapshot();map.start={x,y};render();}
  else if(tool==='object'){snapshot();const o=OBJDEF[curObj]();o.x=x;o.y=y;map.objects.push(o);sel=o;inspector();render();}
  else if(tool==='select'){const o=objAt(x,y);sel=o;if(o)drag={tool:'move',o,ox:x,oy:y};inspector();render();}
  setStatus(x,y);
});
window.addEventListener('mousemove',e=>{
  if(!drag){const{x,y}=tileAtEvent(e);setStatus(x,y);return;}
  if(drag.pan){camX=drag.cx-(e.clientX-drag.sx);camY=drag.cy-(e.clientY-drag.sy);render();return;}
  const {x,y}=tileAtEvent(e);
  if(drag.tool==='paint'){setTile(x,y,curTile);render();}
  else if(drag.tool==='erase'){setTile(x,y,'__erase');render();}
  else if(drag.tool==='rect'){drag.cur={x:Math.max(0,Math.min(map.w-1,x)),y:Math.max(0,Math.min(map.h-1,y))};render();}
  else if(drag.tool==='move'&&drag.o){drag.o.x=Math.max(0,Math.min(map.w-1,x));drag.o.y=Math.max(0,Math.min(map.h-1,y));inspector();render();}
  setStatus(x,y);
});
window.addEventListener('mouseup',e=>{
  if(drag&&drag.tool==='rect'){snapshot();const a=drag,b=drag.cur;const rx=Math.min(a.x,b.x),ry=Math.min(a.y,b.y),rw=Math.abs(a.x-b.x)+1,rh=Math.abs(a.y-b.y)+1;
    for(let j=ry;j<ry+rh;j++)for(let i=rx;i<rx+rw;i++)setTile(i,j,e.shiftKey?'__erase':curTile);}
  drag=null;render();
});
cv.addEventListener('contextmenu',e=>e.preventDefault());
wrap.addEventListener('wheel',e=>{e.preventDefault();const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const wx=(camX+mx)/zoom,wy=(camY+my)/zoom;zoom=Math.max(6,Math.min(48,zoom*(e.deltaY<0?1.12:0.89)));
  camX=wx*zoom-mx;camY=wy*zoom-my;render();},{passive:false});
window.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  const k=e.key.toLowerCase();const m={b:'pencil',r:'rect',f:'fill',e:'erase',o:'object',v:'select',g:'start'};
  if((e.ctrlKey||e.metaKey)&&k==='z'){undo();e.preventDefault();return;}
  if(m[k]){tool=m[k];[...toolbox.children].forEach((c,i)=>c.className=TOOLS[i][0]===tool?'on':'');setStatus();}
  if(k>='0'&&k<='4'){mode='elev';curElev=+k;elevSel();[...document.querySelectorAll('#tilepal .t')].forEach(x=>x.classList.remove('sel'));setStatus();render();}
  if(k==='delete'||k==='backspace'){if(sel){snapshot();map.objects=map.objects.filter(o=>o!==sel);sel=null;inspector();render();}}
});
function floodFill(x,y,t){
  if(mode==='elev'){const from=map.elev[y][x];if(from===curElev)return;const q=[[x,y]];while(q.length){const[i,j]=q.pop();if(!inBounds(i,j)||map.elev[j][i]!==from)continue;map.elev[j][i]=curElev;q.push([i+1,j],[i-1,j],[i,j+1],[i,j-1]);}return;}
  const from=map.tiles[y][x];if(from===t)return;const q=[[x,y]];while(q.length){const[i,j]=q.pop();if(!inBounds(i,j)||map.tiles[j][i]!==from)continue;map.tiles[j][i]=t;q.push([i+1,j],[i-1,j],[i,j+1],[i,j-1]);}}

/* ===== inspector ===== */
function inspector(){const el=$('insp');
  if(!sel){el.innerHTML='<small>Select an object (Select tool / V) to edit it, or pick an Object and click to place. Right-drag or Alt-drag to pan; wheel to zoom.</small>';return;}
  const o=sel;const clone=Object.assign({},o);delete clone.x;delete clone.y;delete clone.type;
  el.innerHTML='<div class="row"><b style="color:'+(OBJC[o.type]||'#fff')+'">'+o.type.toUpperCase()+'</b> <small>@ '+o.x+','+o.y+'</small></div>'+
    '<small>edit the JSON, then Apply:</small><textarea id="props">'+JSON.stringify(clone,null,1)+'</textarea>'+
    '<div class="row"><button id="apply">Apply</button><button class="alt" id="del">Delete</button></div>'+
    '<small id="perr" style="color:#ff8a8a"></small>';
  $('apply').onclick=()=>{try{const p=JSON.parse($('props').value);snapshot();for(const k in clone)delete o[k];Object.assign(o,p);inspector();render();$('perr').textContent='applied';}catch(err){$('perr').textContent='JSON error: '+err.message;}};
  $('del').onclick=()=>{snapshot();map.objects=map.objects.filter(x=>x!==o);sel=null;inspector();render();};
}

/* ===== export ===== */
function esc(s){return (''+s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function greedyRects(){const cov=[];for(let j=0;j<map.h;j++)cov.push(new Array(map.w).fill(false));const out=[];
  for(let j=0;j<map.h;j++)for(let i=0;i<map.w;i++){const t=map.tiles[j][i];if(t===map.base||cov[j][i])continue;
    let w=1;while(i+w<map.w&&map.tiles[j][i+w]===t&&!cov[j][i+w])w++;
    let h=1;outer:while(j+h<map.h){for(let k=0;k<w;k++)if(map.tiles[j+h][i+k]!==t||cov[j+h][i+k])break outer;h++;}
    for(let a=0;a<h;a++)for(let b=0;b<w;b++)cov[j+a][i+b]=true;out.push({x:i,y:j,w,h,t});}
  return out;}
function lootStr(l){return JSON.stringify(l).replace(/"/g,'').replace(/:/g,': ').replace(/,/g,', ');}
function objCode(o){const x=o.x,y=o.y;
  if(o.type==='chest')return "CHEST(m, "+x+", "+y+", "+lootStr(o.loot||{coins:1})+(o.req?", '"+o.req+"'":'')+");";
  if(o.type==='sign')return "SIGN(m, "+x+", "+y+", '"+esc(o.text||'')+"');";
  if(o.type==='npc')return "NPC(m, "+x+", "+y+", '"+(o.who||'granny')+"', '"+esc(o.name||'')+"');";
  if(o.type==='door')return "DOOR(m, "+x+", "+y+", '"+(o.kind||'flag')+"', "+(o.req?"'"+o.req+"'":'null')+", '"+esc(o.msg||'')+"');";
  if(o.type==='spawn')return "SPAWN(m, '"+(o.species||'sheep')+"', "+x+", "+y+", "+(o.sw||1)+", "+(o.sh||1)+", "+(o.n||1)+");";
  if(o.type==='link')return "LINK(m, "+x+", "+y+", '"+(o.to||'vale')+"', "+(o.tx||0)+", "+(o.ty||0)+(o.req?", '"+o.req+"'":'')+(o.msg?", '"+esc(o.msg)+"'":'')+");";
  if(o.type==='post')return "POST(m, "+x+", "+y+");";
  // generic OBJ(...) for everything else
  const props=Object.assign({},o);delete props.type;delete props.x;delete props.y;
  const parts=["type: '"+o.type+"'","x: "+x,"y: "+y];
  for(const k in props){const v=props[k];
    if(Array.isArray(v))parts.push(k+": ["+v.join(', ')+"]");
    else if(typeof v==='string')parts.push(k+": '"+esc(v)+"'");
    else if(typeof v==='object')parts.push(k+": "+lootStr(v));
    else parts.push(k+": "+v);}
  return "OBJ(m, { "+parts.join(', ')+" });";
}
function exportCode(){syncProps();const L=[];const o=[];
  o.push("name: '"+esc(map.name)+"'");if(map.song)o.push("song: '"+map.song+"'");if(map.cliff)o.push("cliff: '"+map.cliff+"'");if(map.zone)o.push("zone: '"+map.zone+"'");
  if(map.dark)o.push('dark: true');if(map.noFly)o.push('noFly: true');if(map.dungeon)o.push('dungeon: true');
  L.push('function '+map.fn+'() {');
  L.push('  if (MAPS.'+map.id+') return;');
  L.push("  const m = newMap('"+map.id+"', "+map.w+", "+map.h+", '"+map.base+"', { "+o.join(', ')+" });");
  L.push('  // --- tiles ---');
  for(const r of greedyRects())L.push(r.w===1&&r.h===1?"  T(m, "+r.x+", "+r.y+", '"+r.t+"');":"  R(m, "+r.x+", "+r.y+", "+r.w+", "+r.h+", '"+r.t+"');");
  const eRects=greedyRectsElev();
  if(eRects.length){L.push('  // --- elevation ---');for(const r of eRects)L.push('  E(m, '+r.x+', '+r.y+', '+r.w+', '+r.h+', '+r.t+');');}
  const objs=map.objects.filter(o=>o.type!=='spawn'&&o.type!=='door'&&o.type!=='link');
  const gates=map.objects.filter(o=>o.type==='door'||o.type==='link');
  const spawns=map.objects.filter(o=>o.type==='spawn');
  if(gates.length){L.push('  // --- doors / links ---');for(const o of gates)L.push('  '+objCode(o));}
  if(objs.length){L.push('  // --- objects ---');for(const o of objs)L.push('  '+objCode(o));}
  if(spawns.length){L.push('  // --- creature herds ---');for(const o of spawns)L.push('  '+objCode(o));}
  L.push('  m.start = { x: '+map.start.x+', y: '+map.start.y+' };');
  L.push('}');
  return L.join('\n');
}
function greedyRectsElev(){const cov=[];for(let j=0;j<map.h;j++)cov.push(new Array(map.w).fill(false));const out=[];
  for(let j=0;j<map.h;j++)for(let i=0;i<map.w;i++){const t=(map.elev[j]||[])[i]||0;if(t===0||cov[j][i])continue;
    let w=1;while(i+w<map.w&&((map.elev[j]||[])[i+w]||0)===t&&!cov[j][i+w])w++;
    let h=1;outer:while(j+h<map.h){for(let k=0;k<w;k++)if((((map.elev[j+h]||[])[i+k])||0)!==t||cov[j+h][i+k])break outer;h++;}
    for(let a=0;a<h;a++)for(let b=0;b<w;b++)cov[j+a][i+b]=true;out.push({x:i,y:j,w,h,t});}
  return out;}
function exportEdit(){syncProps();
  const d={v:1,id:map.id,w:map.w,h:map.h,tiles:map.tiles,elev:map.elev};
  const blob=new Blob([JSON.stringify(d)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=map.id+'.edit.json';a.click();
  showOut('Saved '+map.id+'.edit.json — 3 steps to make it live',
'1) Move the downloaded  '+map.id+'.edit.json  into the game folder\'s  customlevels/\n'+
'2) Run:   python3 build.py\n'+
'3) Open BuffNoahsQuest_v4.html — your repaint is in the game!\n\n'+
'The edit replaces TILES + ELEVATION only. Chests, signs, doors, links, creature herds and\n'+
'the start spot stay exactly where the code puts them (they are shown here for reference).\n'+
'Undo forever: delete customlevels/'+map.id+'.edit.json and rebuild.\n\n'+
'After editing a real level, please run the safety checks:\n'+
'   NODE_PATH=/tmp/node_modules node test/validate.js\n'+
'   NODE_PATH=/tmp/node_modules node test/audit.js '+map.id+'\n'+
'(or ask Claude to run them + push to GitHub for you)');}
$('exporte').onclick=exportEdit;
function showOut(title,text){$('outtitle').textContent=title;$('outtext').value=text;$('out').style.display='block';}
$('exportc').onclick=()=>showOut('Builder code — paste into a src/*.js build file',exportCode());
$('copyout').onclick=()=>{navigator.clipboard.writeText($('outtext').value);$('copyout').textContent='copied!';setTimeout(()=>$('copyout').textContent='Copy',1200);};
$('dlout').onclick=()=>{const blob=new Blob([$('outtext').value],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(map.fn||'level')+'.txt';a.click();};
$('closeout').onclick=()=>$('out').style.display='none';

/* ===== json save / load ===== */
$('exportj').onclick=()=>{syncProps();const blob=new Blob([JSON.stringify(map)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(map.id||'map')+'.json';a.click();};
$('importj').onclick=()=>$('file').click();
$('file').onchange=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{try{const d=JSON.parse(rd.result);if(!d.tiles)throw new Error('not a map json');if(!d.elev){d.elev=[];for(let j=0;j<d.h;j++)d.elev.push(new Array(d.w).fill(0));}map=d;loadProps();fitView();inspector();render();}catch(err){alert('Load failed: '+err.message);}};rd.readAsText(f);};

$('resize').onclick=()=>{const w=Math.max(8,Math.min(120,+$('mw').value|0)),h=Math.max(8,Math.min(80,+$('mh').value|0));snapshot();
  const nt=[],ne=[];for(let j=0;j<h;j++){const row=[],er=[];for(let i=0;i<w;i++){row.push((map.tiles[j]&&map.tiles[j][i])||map.base);er.push((map.elev&&map.elev[j]&&map.elev[j][i])||0);}nt.push(row);ne.push(er);}map.tiles=nt;map.elev=ne;map.w=w;map.h=h;
  map.start.x=Math.min(map.start.x,w-1);map.start.y=Math.min(map.start.y,h-1);render();};
$('grid').onchange=e=>{showGrid=e.target.checked;render();};

function fitView(){const z=Math.max(6,Math.min(40,Math.floor(Math.min(cv.width/(map.w+2),cv.height/(map.h+2)))));zoom=z;camX=(map.w*z-cv.width)/2;camY=(map.h*z-cv.height)/2;}
function setStatus(x,y){const t=(x!=null&&inBounds(x,y))?map.tiles[y][x]:'-';
  const eh=(x!=null&&inBounds(x,y)&&map.elev)?(((map.elev[y]||[])[x])||0):'-';
  $('status').textContent='paint: '+(mode==='elev'?('HEIGHT E'+curElev):('tile '+curTile))+'   object: '+curObj+'   |   cursor: '+(x==null?'-':x+','+y)+' ('+t+' e'+eh+')   |   '+map.w+'x'+map.h+', '+map.objects.length+' objects   |   B paint · R rect · F fill · E erase · O object · V select · G start · 0-4 height · Ctrl+Z undo · wheel zoom · alt/right-drag pan';}

// boot
loadProps();resizeCanvas();fitView();render();setStatus();inspector();
[...op.children].forEach(x=>x.classList.toggle('sel',x.textContent===curObj));
window.ED = { TILE_IDS, GAME_MAPS, SPECIES, getMap: () => map, loadGameMap };   // debug/test handle
})();
</script>
</body></html>
